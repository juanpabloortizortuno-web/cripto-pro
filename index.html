<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDC FUTURO — Terminal</title>
<style>
  :root{
    --bg: #050a14;
    --panel: #0b1220;
    --line: #1c2940;
    --amber: #f59e0b;
    --amber-dim: #92650f;
    --green: #34d399;
    --red: #f87171;
    --text: #e7ecf5;
    --text-dim: #7c8aa3;
    --mono: "JetBrains Mono", "SF Mono", "Consolas", monospace;
    --sans: "Inter", "Segoe UI", Arial, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    padding: 24px;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(245,158,11,0.06), transparent 40%),
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: auto, 48px 48px, 48px 48px;
    background-attachment: fixed;
  }

  .wrap{ max-width: 920px; margin: 0 auto; }

  header{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }

  h1{
    font-family: var(--mono);
    font-size: 1.4rem;
    letter-spacing: 0.04em;
    color: var(--amber);
    margin: 0;
    text-transform: uppercase;
  }
  h1 span{ color: var(--text-dim); font-weight: 400; }

  .clock{
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .statusbar{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
    box-shadow: 0 0 0 0 rgba(245,158,11,0.6);
  }
  .dot.live{ background: var(--green); animation: pulse 1.8s infinite; }
  .dot.error{ background: var(--red); animation: none; }

  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    70%{ box-shadow: 0 0 0 6px rgba(52,211,153,0); }
    100%{ box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .card-head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .refresh-btn{
    background: transparent;
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .refresh-btn:hover{ background: var(--amber); color: #1a1206; }
  .refresh-btn:focus-visible{ outline: 2px solid var(--amber); outline-offset: 2px; }
  .refresh-btn:disabled{ opacity: 0.5; cursor: default; }

  .noticia{
    display: block;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s ease;
  }
  .noticia:last-child{ border-bottom: none; }
  .noticia:hover{ background: rgba(245,158,11,0.06); }
  .noticia:focus-visible{ outline: 2px solid var(--amber); outline-offset: -2px; }

  .noticia .meta{
    display: flex;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 4px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--amber-dim);
  }

  .noticia .fuente{ color: var(--amber); }

  .noticia .titulo{
    font-size: 0.95rem;
    line-height: 1.4;
  }

  .empty, .skeleton-wrap{
    padding: 32px 16px;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .skeleton{
    height: 14px;
    margin: 10px auto;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--line) 25%, #28395a 37%, var(--line) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{
    0%{ background-position: 100% 0; }
    100%{ background-position: 0 0; }
  }

  footer{
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.72rem;
    margin-top: 28px;
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce){
    .dot.live, .skeleton{ animation: none; }
  }

  @media (max-width: 560px){
    body{ padding: 16px; }
    h1{ font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>📡 CDC FUTURO <span>// TERMINAL</span></h1>
    <div class="clock" id="reloj"></div>
  </header>

  <div class="statusbar">
    <span class="dot" id="dot"></span>
    <span id="status">Iniciando conexión…</span>
  </div>

  <div class="card">
    <div class="card-head">
      <span>Noticias cripto — en vivo</span>
      <button class="refresh-btn" id="btnRefresh" type="button">Actualizar</button>
    </div>
    <div id="feed">
      <div class="skeleton-wrap">
        <div class="skeleton" style="width:80%"></div>
        <div class="skeleton" style="width:65%"></div>
        <div class="skeleton" style="width:72%"></div>
      </div>
    </div>
  </div>

  <footer>Actualización automática cada 5 minutos · Fuentes: CoinDesk / Cointelegraph</footer>
</div>

<script>
// ---------------------------------------------------------------
// Reloj
// ---------------------------------------------------------------
function actualizarReloj(){
  const ahora = new Date();
  document.getElementById('reloj').textContent = ahora.toLocaleTimeString('es-BO');
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ---------------------------------------------------------------
// Configuración de fuentes (RSS, formato estable) y proxies CORS
// Si una fuente o un proxy falla, se intenta la siguiente combinación.
// ---------------------------------------------------------------
const FUENTES = [
  { nombre: 'CoinDesk',       url: 'https://www.coindesk.com/arc/outboundfeeds/rss/' },
  { nombre: 'Cointelegraph',  url: 'https://cointelegraph.com/rss' },
  { nombre: 'Decrypt',        url: 'https://decrypt.co/feed' },
  { nombre: 'Bitcoin.com',    url: 'https://news.bitcoin.com/feed/' },
];

const PROXIES = [
  { nombre: 'allorigins',  fn: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
  { nombre: 'corsproxy',   fn: url => `https://corsproxy.io/?url=${encodeURIComponent(url)}` },
  { nombre: 'codetabs',    fn: url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
  { nombre: 'thingproxy',  fn: url => `https://thingproxy.freeboard.io/fetch/${url}` },
];

const dotEl = document.getElementById('dot');
const statusEl = document.getElementById('status');
const feedEl = document.getElementById('feed');
const btnRefresh = document.getElementById('btnRefresh');

function setStatus(texto, tipo){
  statusEl.textContent = texto;
  dotEl.className = 'dot' + (tipo ? ' ' + tipo : '');
}

function formatearFecha(pubDate){
  if(!pubDate) return '';
  const d = new Date(pubDate);
  if(isNaN(d)) return '';
  return d.toLocaleDateString('es-BO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

async function fetchConTimeout(url, ms = 8000){
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  try{
    const res = await fetch(url, { signal: controller.signal });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  } finally {
    clearTimeout(id);
  }
}

async function obtenerFeedDeFuente(fuente){
  let ultimoError = null;
  for(const proxy of PROXIES){
    try{
      const xml = await fetchConTimeout(proxy.fn(fuente.url));
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const items = Array.from(doc.querySelectorAll('item')).slice(0, 8);
      if(items.length === 0) throw new Error('Feed vacío o XML no parseable');
      console.log(`✓ ${fuente.nombre} via ${proxy.nombre}: ${items.length} items`);
      return items.map(item => ({
        fuente: fuente.nombre,
        titulo: item.querySelector('title')?.textContent?.trim() || 'Sin título',
        link: item.querySelector('link')?.textContent?.trim() || '#',
        fecha: item.querySelector('pubDate')?.textContent?.trim() || '',
      }));
    }catch(err){
      console.warn(`✗ ${fuente.nombre} via ${proxy.nombre}: ${err.message}`);
      ultimoError = err;
      continue; // probar el siguiente proxy
    }
  }
  throw ultimoError || new Error('No se pudo obtener ' + fuente.nombre);
}

function renderNoticias(noticias){
  feedEl.innerHTML = '';

  if(noticias.length === 0){
    feedEl.innerHTML = `<div class="empty">Sin noticias disponibles por ahora. Probá actualizar en unos minutos.</div>`;
    return;
  }

  noticias.forEach(n => {
    const a = document.createElement('a');
    a.className = 'noticia';
    a.href = n.link;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="meta">
        <span class="fuente">${n.fuente}</span>
        ${n.fecha ? `<span>${formatearFecha(n.fecha)}</span>` : ''}
      </div>
      <div class="titulo">${n.titulo}</div>
    `;
    feedEl.appendChild(a);
  });
}

async function cargarNoticias(){
  btnRefresh.disabled = true;
  setStatus('Conectando con las fuentes…');

  const resultados = await Promise.allSettled(FUENTES.map(obtenerFeedDeFuente));

  let todas = [];
  let algunaFalló = false;
  let errores = [];

  resultados.forEach((r, i) => {
    if(r.status === 'fulfilled'){
      todas = todas.concat(r.value);
    } else {
      algunaFalló = true;
      errores.push(`${FUENTES[i].nombre}: ${r.reason?.message || r.reason}`);
      console.error('Error en', FUENTES[i].nombre, r.reason);
    }
  });

  // Ordenar por fecha descendente cuando hay fecha disponible
  todas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

  if(todas.length > 0){
    renderNoticias(todas.slice(0, 14));
    setStatus(
      algunaFalló
        ? 'Conectado parcialmente (alguna fuente no respondió).'
        : 'Conectado. Última actualización: ' + new Date().toLocaleTimeString('es-BO'),
      'live'
    );
  } else {
    feedEl.innerHTML = `<div class="empty">No se pudo conectar con ninguna fuente.<br>
      <span style="opacity:0.7; font-size:0.78rem;">${errores.join('<br>')}</span></div>`;
    setStatus('Error: no se pudo conectar.', 'error');
  }

  btnRefresh.disabled = false;
}

btnRefresh.addEventListener('click', cargarNoticias);

// Carga inicial + auto-refresh cada 5 minutos
cargarNoticias();
setInterval(cargarNoticias, 5 * 60 * 1000);
</script>
</body>
</html>
