<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDC FUTURO-PRO | PROYECTO TECNOMAN</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #080a0e;
            --bg-card: #12161c;
            --accent-gold: #f3ba2f;
            --accent-green: #02c076;
            --accent-red: #f84960;
            --text-main: #eaecef;
            --text-dim: #848e9c;
            --border: #2b3139;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            height: 65px;
            box-sizing: border-box;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .brand b {
            font-size: 16px;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        #statusBadge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            width: fit-content;
            margin-top: 2px;
        }
        .badge-free { background: #2b3139; color: #fff; border: 1px solid #474d57; }
        .badge-premium { background: rgba(243, 186, 47, 0.15); color: var(--accent-gold); border: 1px solid var(--accent-gold); }

        #menuToggle {
            background: #1b2129;
            border: 1px solid var(--border);
            color: var(--accent-gold);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .container {
            display: flex;
            height: calc(100vh - 65px);
            position: relative;
        }

        .sidebar {
            width: 100%;
            max-width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar.hidden { transform: translateX(-100%); }

        .sidebar-header {
            padding: 15px;
            background: #1b2129;
            border-bottom: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: var(--bg-card); font-size: 11px; padding: 15px 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-align: left; }
        td { padding: 16px 12px; font-size: 14px; border-bottom: 1px solid #1e2329; cursor: pointer; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 15px; width: 100%; overflow-y: auto; box-sizing: border-box; }

        .card { background: var(--bg-card); padding: 25px 20px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 480px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .price-hero { text-align: center; margin-bottom: 20px; }
        .price-hero h2 { font-size: 38px; margin: 10px 0; color: var(--accent-gold); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box small { color: var(--text-dim); font-size: 11px; display: block; margin-bottom: 5px; }

        .actions { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }

        .btn { padding: 16px; border-radius: 12px; text-align: center; font-weight: 800; border: none; cursor: pointer; text-decoration: none; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .binance { background: var(--accent-gold); color: #000; }
        .ws { background: #25D366; color: white; }
        .vip { background: #1b2129; color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .tk { background: #000; color: #fff; border: 1px solid #333; }

        .overlay-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 10, 14, 0.98); backdrop-filter: blur(12px); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; text-align: center; }

        .input-pro { width: 100%; max-width: 300px; padding: 18px; margin: 15px 0; background: #000; border: 2px solid var(--accent-gold); color: var(--accent-gold); text-align: center; border-radius: 14px; font-size: 18px; font-weight: bold; outline: none; }

        @media (max-width: 600px) { .sidebar { width: 88%; } .price-hero h2 { font-size: 32px; } }
    </style>
</head>
<body>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="overlay-panel">
    <h2 style="color:var(--accent-gold);">GENERADOR VIP</h2>
    <input type="text" id="adminUser" class="input-pro" placeholder="NOMBRE CLIENTE">
    <button onclick="generarLicencia()" class="btn binance" style="width:100%; max-width:300px;">GENERAR 1 AÑO</button>
    <div id="keyResult" style="margin-top:20px; background:#000; padding:15px; border-radius:10px; font-size:11px; display:none; word-break:break-all; color:var(--accent-gold); border: 1px dashed var(--accent-gold);"></div>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="margin-top:20px; color:var(--text-dim); background:none; border:none; cursor:pointer;">Cerrar</button>
</div>

<!-- PANEL ACTIVACIÓN (Casilla para colocar licencia antes de que venza) -->
<div id="activationPanel" class="overlay-panel">
    <i class="fas fa-key" style="font-size:50px; color:var(--accent-gold); margin-bottom:20px;"></i>
    <h2>ACTIVAR LICENCIA VIP</h2>
    <p style="color:var(--text-dim)">Ingresa tu código para acceso ilimitado</p>
    <input type="text" id="manualLicenseInput" class="input-pro" placeholder="PEGA TU CÓDIGO AQUÍ">
    <button onclick="activarManual()" class="btn binance" style="width:100%; max-width:300px;">ACTIVAR AHORA</button>
    <button onclick="document.getElementById('activationPanel').style.display='none'" style="margin-top:20px; color:var(--text-dim); background:none; border:none; cursor:pointer;">Cancelar</button>
</div>

<!-- BLOQUEO POR USOS -->
<div id="lockScreen" class="overlay-panel">
    <i class="fas fa-crown" style="font-size:70px; color:var(--accent-gold); margin-bottom:25px;"></i>
    <h1>SISTEMA BLOQUEADO</h1>
    <p id="lockMsg" style="color:var(--text-dim);">Has agotado tus 10 usos gratuitos.</p>
    <input type="text" id="licenseInput" class="input-pro" placeholder="CÓDIGO DE LICENCIA">
    <button onclick="activar()" class="btn binance" style="width:100%; max-width:300px;">ACTIVAR VIP</button>
    <a href="https://wa.me/59177244375" target="_blank" class="btn ws" style="width:100%; max-width:300px; margin-top:15px;"><i class="fab fa-whatsapp"></i> COMPRAR LICENCIA</a>
</div>

<header>
    <div class="brand-container">
        <button id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="brand" onclick="accesoAdmin()">
            <b>CDC FUTURO-PRO</b>
            <span id="statusBadge">...</span>
        </div>
    </div>
    <div style="display:flex; gap:8px;">
        <a href="https://www.tiktok.com/@chicodelascomputadoras" target="_blank" class="btn tk" style="padding: 10px;"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/59177244375" target="_blank" class="btn ws" style="padding: 10px;"><i class="fab fa-whatsapp"></i></a>
    </div>
</header>

<div class="container">
    <div class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <button onclick="document.getElementById('activationPanel').style.display='flex'" class="btn vip" style="width:100%; font-size:12px; padding:10px;">
                <i class="fas fa-crown"></i> 🔑 ACTIVAR LICENCIA
            </button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>CRIPTO</th>
                    <th>CAMBIO</th>
                    <th>ZONA</th>
                </tr>
            </thead>
            <tbody id="cryptoList"></tbody>
        </table>
    </div>

    <div class="main">
        <div class="card" id="detailView">
            <div style="text-align:center; padding: 40px 0; color:var(--text-dim);">
                <i class="fas fa-rocket" style="font-size:50px; margin-bottom:15px; opacity:0.2;"></i>
                <p>Bienvenido, Juan Pablo.<br>Selecciona una moneda del menú.</p>
            </div>
        </div>
        <div class="actions">
            <a id="linkBinance" class="btn binance" target="_blank" style="display:none;"><i class="fas fa-external-link-alt"></i> BINANCE WEB</a>
            <a id="linkApp" class="btn vip" target="_blank" style="display:none;"><i class="fas fa-mobile"></i> APP BINANCE</a>
        </div>
    </div>
</div>

<script>
    const ADMIN_KEY = "melfy777";
    const PREFIX = "CDC-2026-";

    let usages = parseInt(localStorage.getItem("cdc_usage_count")) || 0;
    let expiry = localStorage.getItem("cdc_expiry_date");

    function updateStatusUI() {
        const badge = document.getElementById("statusBadge");
        if(expiry) {
            badge.innerText = "LICENCIA PREMIUM";
            badge.className = "badge-premium";
        } else {
            badge.innerText = `USOS: ${Math.max(0, 10 - usages)}/10`;
            badge.className = "badge-free";
        }
    }

    function checkSecurity() {
        const now = new Date().getTime();
        updateStatusUI();
        if(expiry) {
            if(now > parseInt(expiry)) {
                document.getElementById("lockScreen").style.display = "flex";
                document.getElementById("lockMsg").innerText = "Licencia expirada.";
                return false;
            }
            return true;
        }
        if(usages >= 10) {
            document.getElementById("lockScreen").style.display = "flex";
            return false;
        }
        return true;
    }

    function accesoAdmin() {
        let p = prompt("PASSWORD:");
        if(p === ADMIN_KEY) document.getElementById("adminPanel").style.display = "flex";
    }

    function generarLicencia() {
        let u = document.getElementById("adminUser").value.trim();
        if(!u) return alert("Nombre?");
        let key = btoa(PREFIX + u + "-1YEAR").replace(/=/g, "");
        document.getElementById("keyResult").style.display = "block";
        document.getElementById("keyResult").innerText = key;
    }

    // Función para activar desde el botón del menú (antes de que se bloquee)
    function activarManual() {
        let val = document.getElementById("manualLicenseInput").value.trim();
        validarYActivar(val);
    }

    // Función para activar desde la pantalla de bloqueo
    function activar() {
        let val = document.getElementById("licenseInput").value.trim();
        validarYActivar(val);
    }

    function validarYActivar(val) {
        try {
            let dec = atob(val);
            if(dec.startsWith(PREFIX) && dec.endsWith("-1YEAR")) {
                let oneYear = new Date().getTime() + (365 * 24 * 60 * 60 * 1000);
                localStorage.setItem("cdc_expiry_date", oneYear.toString());
                alert("¡VIP ACTIVADO!");
                location.reload();
            } else { alert("CÓDIGO INVÁLIDO"); }
        } catch(e) { alert("ERROR DE FORMATO"); }
    }

    let all = [];
    document.getElementById("menuToggle").onclick = () => {
        document.getElementById("sidebar").classList.toggle("hidden");
    };

    async function load() {
        if(!checkSecurity()) return;
        try {
            const [ex, tick] = await Promise.all([
                fetch("https://fapi.binance.com/fapi/v1/exchangeInfo").then(r => r.json()),
                fetch("https://fapi.binance.com/fapi/v1/ticker/24hr").then(r => r.json())
            ]);
            const active = ex.symbols.filter(s => s.status === "TRADING").map(s => s.symbol);
            all = tick.filter(t => active.includes(t.symbol)).map(t => {
                const price = parseFloat(t.lastPrice);
                const high = parseFloat(t.highPrice);
                const low = parseFloat(t.lowPrice);
                const change = parseFloat(t.priceChangePercent);
                const distLow = ((price - low) / (high - low)) * 100;
                return { symbol: t.symbol, name: t.symbol.replace("USDT", ""), price, change, high, low, distLow };
            });
            all.sort((a, b) => a.distLow - b.distLow);
            render();
        } catch(e) {}
    }

    function render() {
        const body = document.getElementById("cryptoList");
        body.innerHTML = "";
        all.forEach(c => {
            let alarma = c.distLow < 15 && Math.abs(c.change) >= 4;
            const tr = document.createElement("tr");
            if(alarma) tr.style.background = "rgba(248,73,96,0.12)";
            tr.innerHTML = `
                <td style="font-weight:bold;">${c.name} ${alarma ? '🚨' : ''}</td>
                <td style="color:${c.change >= 0 ? '#02c076' : '#f84960'}; font-weight:600;">${c.change.toFixed(2)}%</td>
                <td style="color:var(--text-dim);">${c.distLow.toFixed(1)}%</td>
            `;
            tr.onclick = () => {
                show(c);
                if(window.innerWidth < 600) document.getElementById("sidebar").classList.add("hidden");
            };
            body.appendChild(tr);
        });
    }

    function show(c) {
        if(!expiry) {
            usages++;
            localStorage.setItem("cdc_usage_count", usages);
            updateStatusUI();
            if(usages > 10) return location.reload();
        }
        document.getElementById("detailView").innerHTML = `
            <div class="price-hero">
                <p>${c.symbol}</p>
                <h2>$${c.price}</h2>
                <div style="color:${c.change >= 0 ? '#02c076' : '#f84960'}; font-weight:bold; font-size:20px;">
                    ${c.change >= 0 ? '▲' : '▼'} ${c.change.toFixed(2)}%
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><small>Mínimo 24h</small><b>$${c.low}</b></div>
                <div class="stat-box"><small>Máximo 24h</small><b>$${c.high}</b></div>
                <div class="stat-box"><small>Dist. Suelo</small><b>${c.distLow.toFixed(1)}%</b></div>
                <div class="stat-box"><small>Estado</small><b style="color:${c.distLow < 25 ? '#f84960' : '#02c076'}">${c.distLow < 25 ? 'COMPRA' : 'NORMAL'}</b></div>
            </div>
        `;
        document.getElementById("linkBinance").style.display = "flex";
        document.getElementById("linkBinance").href = `https://www.binance.com/es/futures/${c.symbol}`;
        document.getElementById("linkApp").style.display = "flex";
        document.getElementById("linkApp").href = `binance://futures/trade?symbol=${c.symbol}`;
    }

    load();
    setInterval(load, 15000);
</script>
</body>
</html>
