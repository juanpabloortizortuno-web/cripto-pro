<script>

const ADMIN_KEY="melfy777";
const PREFIX="CDC-2026-";

let usages=parseInt(localStorage.getItem("cdc_usage_count"))||0;
let expiry=localStorage.getItem("cdc_expiry_date");

function checkSecurity(){

const now=new Date().getTime();

if(expiry){

if(now>parseInt(expiry)){

document.getElementById("lockScreen").style.display="flex";

document.getElementById("lockMsg").innerText=
"Tu licencia expiró.";

return false;
}

return true;
}

if(usages>=10){

document.getElementById("lockScreen").style.display="flex";

return false;
}

return true;
}

function accesoAdmin(){

let p=prompt("PASSWORD ADMIN:");

if(p===ADMIN_KEY){

document.getElementById("adminPanel").style.display="block";
}
}

function generarLicencia(){

let u=document.getElementById("adminUser").value;

if(!u) return alert("Pon nombre");

let key=btoa(PREFIX+u+"-1YEAR").replace(/=/g,"");

document.getElementById("keyResult").style.display="block";

document.getElementById("keyResult").innerText=key;
}

function activar(){

let val=document.getElementById("licenseInput").value;

try{

let dec=atob(val);

if(dec.startsWith(PREFIX) && dec.endsWith("-1YEAR")){

let year=new Date().getTime()+(365*24*60*60*1000);

localStorage.setItem("cdc_expiry_date",year.toString());

alert("VIP ACTIVADO");

location.reload();

}else{

alert("CLAVE INVALIDA");
}

}catch(e){

alert("FORMATO INCORRECTO");
}
}

let all=[];

document.getElementById("menuToggle").onclick=()=>{

document.getElementById("sidebar").classList.toggle("hidden");

};

async function load(){

if(!checkSecurity()) return;

const [ex,tick]=await Promise.all([

fetch("https://fapi.binance.com/fapi/v1/exchangeInfo")
.then(r=>r.json()),

fetch("https://fapi.binance.com/fapi/v1/ticker/24hr")
.then(r=>r.json())

]);

const active=ex.symbols
.filter(s=>s.status==="TRADING")
.map(s=>s.symbol);

all=tick.filter(t=>active.includes(t.symbol)).map(t=>{

const price=parseFloat(t.lastPrice);
const high=parseFloat(t.highPrice);
const low=parseFloat(t.lowPrice);
const change=parseFloat(t.priceChangePercent);

const distLow=((price-low)/(high-low))*100;

return{
symbol:t.symbol,
name:t.symbol.replace("USDT",""),
price,change,high,low,distLow
};

});

all.sort((a,b)=>a.distLow-b.distLow);

render();
}

function render(){

const body=document.getElementById("cryptoList");

body.innerHTML="";

all.forEach(c=>{

let alarma = c.distLow < 15 && Math.abs(c.change) >= 5;

let rebote = c.distLow >= 5 && c.distLow <= 25 && c.change >= 5;

let turtle = c.change <= -3;
let rocket = c.change >= 5;

const tr=document.createElement("tr");

if(alarma) tr.classList.add("alarmRow");
if(rebote) tr.classList.add("rebote");

tr.innerHTML=`

<td class="alarm">

${c.name}
${turtle?'🐢':''}
${rocket?'⚡':''}
${alarma?'🚨':''}

</td>

<td class="${c.change>=0?'green':'red'}">
${c.change.toFixed(2)}%
</td>

<td>
${c.distLow.toFixed(1)}%
</td>

`;

tr.onclick=()=>show(c);

body.appendChild(tr);

});

}

function show(c){

if(!expiry){

usages++;

localStorage.setItem("cdc_usage_count",usages);
}

document.getElementById("detailView").innerHTML=`

<div class="price-hero">

<p>${c.symbol}</p>

<h2>$${c.price}</h2>

<span class="${c.change>=0?'green':'red'}">

${c.change.toFixed(2)}%

</span>

</div>

<div class="stats-grid">

<div class="stat-box">
<small>MIN</small>
${c.low}
</div>

<div class="stat-box">
<small>MAX</small>
${c.high}
</div>

<div class="stat-box">
<small>REBOTE</small>
${c.distLow.toFixed(1)}%
</div>

<div class="stat-box">
<small>ZONA</small>
${c.distLow<25?'🔥 ALERTA':'NORMAL'}
</div>

</div>

`;

document.getElementById("linkBinance").style.display="block";

document.getElementById("linkBinance").href=
`https://www.binance.com/es/futures/${c.symbol}`;

document.getElementById("linkApp").style.display="block";

document.getElementById("linkApp").href=
`binance://futures/trade?symbol=${c.symbol}`;
}

load();

setInterval(load,15000);

</script>
